# ===================================================================
# Common Core Configurations
# ===================================================================
server.port=8080

# Active Spring Profile (dev is default local H2 profile, prod uses PostgreSQL + Redis)
spring.profiles.active=dev

# Disable standard JPA Open In View behavior
spring.jpa.open-in-view=false

# Automatic Database Migrations updates
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Allow circular references
spring.main.allow-circular-references=true

# ===================================================================
# Security & Auth Configuration
# ===================================================================
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration-ms=86400000

# ===================================================================
# OpenAI Integration Default Configuration
# ===================================================================
openai.api.key=mock-key
openai.api.url=https://api.openai.com/v1/chat/completions

# ===================================================================
# Profile: dev (H2 in-memory local fallback)
# ===================================================================
%dev.spring.datasource.url=jdbc:h2:mem:codesync;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
%dev.spring.datasource.driver-class-name=org.h2.Driver
%dev.spring.datasource.username=sa
%dev.spring.datasource.password=password
%dev.spring.h2.console.enabled=true
%dev.spring.h2.console.path=/h2-console
%dev.spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===================================================================
# Profile: prod (Production PostgreSQL + Redis)
# ===================================================================
%prod.spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/codesync}
%prod.spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
%prod.spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password123}
%prod.spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
%prod.spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
%prod.spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
